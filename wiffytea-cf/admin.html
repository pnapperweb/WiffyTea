<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --blue:#3a82c4;--blue-mid:#2e6fab;--blue-dark:#1d4f80;
  --blue-light:#5fa3d8;--blue-pale:#d6e9f7;--blue-ultra:#eef5fc;
  --white:#ffffff;--off-white:#f2f6fb;--sheet:#ffffff;
  --label:#0d1b2a;--label-sec:#4a6580;--label-ter:#8da8c0;
  --sep:rgba(58,130,196,0.13);--sep-strong:rgba(58,130,196,0.22);
  --fill-1:rgba(58,130,196,0.06);--fill-2:rgba(58,130,196,0.10);
  --success:#34a853;--danger:#e53935;--amber:#f59e0b;
  --r-xl:22px;--r-pill:99px;
  --shadow:0 2px 14px rgba(30,80,140,0.10),0 1px 3px rgba(30,80,140,0.07);
  --shadow-btn:0 4px 18px rgba(30,100,200,0.24);
}
html,body{height:100%;background:var(--off-white);}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--label);-webkit-font-smoothing:antialiased;overscroll-behavior:none;}
.app{max-width:430px;margin:0 auto;min-height:100vh;padding-bottom:env(safe-area-inset-bottom,24px);background:var(--off-white);}

/* HEADER */
.app-header{background:linear-gradient(155deg,#1a3d5c 0%,#2e6fab 50%,#3a82c4 100%);padding:52px 24px 28px;position:relative;overflow:hidden;}
.app-header::before{content:'';position:absolute;top:-70px;right:-50px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,0.06);}
.app-header::after{content:'';position:absolute;bottom:-90px;left:-50px;width:220px;height:220px;border-radius:50%;background:rgba(255,255,255,0.04);}
.logo-wrap{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;}
.logo-img{width:120px;height:auto;border-radius:16px;display:block;box-shadow:0 8px 32px rgba(10,40,90,0.28);}
.header-title{color:#fff;font-size:20px;font-weight:800;margin-top:14px;letter-spacing:0.01em;}
.header-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,0.15);color:rgba(255,255,255,0.9);font-size:12px;font-weight:700;padding:4px 12px;border-radius:99px;margin-top:6px;letter-spacing:0.05em;}

.scroll-body{padding:18px 14px 32px;display:flex;flex-direction:column;gap:16px;}
.card{background:var(--sheet);border-radius:var(--r-xl);box-shadow:var(--shadow);overflow:hidden;animation:fadeUp 0.42s ease both;}
.card:nth-child(2){animation-delay:0.06s;}.card:nth-child(3){animation-delay:0.12s;}
.card-title{font-size:12px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;color:var(--blue-mid);padding:15px 18px 9px;}

/* PENDING ORDER DISPLAY */
.pending-wrap{padding:4px 18px 18px;}
.pending-empty{font-size:14px;color:var(--label-ter);font-weight:600;text-align:center;padding:10px 0 4px;}
.pending-order{background:var(--blue-ultra);border:1.5px solid var(--blue-pale);border-radius:16px;padding:14px 16px;display:flex;flex-direction:column;gap:6px;}
.pending-tea{font-size:18px;font-weight:800;color:var(--label);display:flex;align-items:center;gap:8px;}
.pending-detail{font-size:13px;color:var(--label-sec);font-weight:500;}
.pending-detail strong{color:var(--label);font-weight:700;}
.pending-time{font-size:12px;color:var(--label-ter);font-weight:700;margin-top:2px;}

/* READY BUTTON */
.ready-section{padding:0 18px 18px;}
.ready-btn{width:100%;padding:17px;background:linear-gradient(135deg,#1e7e40 0%,#34a853 100%);color:#fff;border:none;border-radius:var(--r-xl);font-family:'Nunito',sans-serif;font-size:17px;font-weight:800;cursor:pointer;box-shadow:0 4px 18px rgba(30,126,64,0.30);transition:opacity 0.18s,transform 0.12s;-webkit-tap-highlight-color:transparent;}
.ready-btn:hover:not(:disabled){box-shadow:0 6px 22px rgba(30,126,64,0.40);}
.ready-btn:active:not(:disabled){transform:scale(0.98);}
.ready-btn:disabled{opacity:0.36;cursor:default;box-shadow:none;}
.ready-status{text-align:center;font-size:14px;font-weight:700;margin-top:10px;min-height:20px;color:var(--label-ter);}
.ready-status.ok{color:var(--success);}.ready-status.err{color:var(--danger);}

/* RECIPIENT CHIPS */
.recipient-wrap{padding:0 18px 16px;display:flex;flex-wrap:wrap;gap:8px;}
.r-chip{padding:8px 14px;border-radius:var(--r-pill);border:1.5px solid var(--sep-strong);background:transparent;font-size:13px;font-weight:700;color:var(--label-sec);cursor:pointer;transition:all 0.15s;-webkit-tap-highlight-color:transparent;user-select:none;}
.r-chip.selected{border-color:var(--success);background:#e6f4ea;color:#1e7e40;}

/* QUEUE LIST */
.queue-row{display:flex;align-items:center;gap:12px;padding:12px 18px;position:relative;}
.queue-row+.queue-row::before{content:'';position:absolute;top:0;left:54px;right:0;height:0.5px;background:var(--sep);}
.q-icon{width:38px;height:38px;border-radius:10px;background:var(--blue-ultra);display:flex;align-items:center;justify-content:center;font-size:1.25rem;flex-shrink:0;}
.q-info{flex:1;min-width:0;}
.q-name{font-size:15px;font-weight:700;color:var(--label);}
.q-sub{font-size:12px;color:var(--label-sec);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.q-meta{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;}
.q-time{font-size:12px;color:var(--label-ter);font-weight:700;}
.q-badge{font-size:10px;font-weight:800;padding:2px 8px;border-radius:99px;background:var(--fill-2);color:var(--blue-mid);}
.q-badge.sent{background:#e6f4ea;color:#1e7e40;}
.empty-state{padding:18px;font-size:14px;color:var(--label-ter);text-align:center;font-weight:600;}

/* TOAST */
.toast{position:fixed;bottom:calc(28px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%) translateY(120px);background:rgba(13,27,42,0.93);color:#fff;padding:13px 26px;border-radius:var(--r-pill);font-size:15px;font-weight:700;font-family:'Nunito',sans-serif;white-space:nowrap;z-index:999;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,0.25);transition:transform 0.38s cubic-bezier(.22,1,.36,1);}
.toast.show{transform:translateX(-50%) translateY(0);}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>
<div class="app">
  <div class="app-header">
    <div class="logo-wrap">
      <img class="logo-img" id="logo-img" src="" alt="Wiffy Tea"/>
      <div class="header-title">Wiffy Tea</div>
      <div class="header-badge">🔧 Admin Panel</div>
    </div>
  </div>

  <div class="scroll-body">

    <!-- Pending order -->
    <div class="card">
      <div class="card-title">Latest Order</div>
      <div class="pending-wrap">
        <div id="pending-display" class="pending-empty">No orders received yet ☕</div>
      </div>
    </div>

    <!-- Notify recipients -->
    <div class="card" id="ready-card" style="display:none;">
      <div class="card-title">Notify — Order Ready</div>
      <div style="padding:0 18px 8px;font-size:13px;color:var(--label-sec);font-weight:500;">Select who to notify:</div>
      <div class="recipient-wrap" id="recipient-wrap">
        <div class="r-chip selected" data-key="brooke">🧋 Brooke</div>
        <div class="r-chip" data-key="paul">☕ Paul</div>
      </div>
      <div class="ready-section">
        <button class="ready-btn" id="ready-btn">☕ Send "Order Ready" Notification</button>
        <div class="ready-status" id="ready-status"></div>
      </div>
    </div>

    <!-- Order queue -->
    <div class="card">
      <div class="card-title">Order Queue</div>
      <div id="queue-list"><div class="empty-state">No orders yet today ☕</div></div>
    </div>

  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const RECIPIENTS = {
  brooke: { name: 'Brooke', phone: '+61434817228' },
  paul:   { name: 'Paul',   phone: '+61402607077' }
};

async function sendSMS(to, message) {
  const res = await fetch('/send-sms', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ to, message })
  });
  if (!res.ok) throw new Error(await res.text());
}

const SB_URL = 'https://acsulaharyphoxjpbomt.supabase.co';
const SB_KEY = 'sb_publishable_sfSCplenSKGzrRyH4g_XVA_Kx24TaeI';

async function sbFetchOrders() {
  const res = await fetch(
    `${SB_URL}/rest/v1/orders?order=created_at.desc&limit=20`,
    { headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY } }
  );
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

async function sbMarkNotified(id) {
  await fetch(`${SB_URL}/rest/v1/orders?id=eq.${id}`, {
    method: 'PATCH',
    headers: {
      'apikey': SB_KEY,
      'Authorization': 'Bearer ' + SB_KEY,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ notified: true })
  });
}

// ── State ────────────────────────────────────────────────────
let queue = [];
let latestOrder = null;

const pendingDisplay = document.getElementById('pending-display');
const readyCard      = document.getElementById('ready-card');
const readyBtn       = document.getElementById('ready-btn');
const readyStatus    = document.getElementById('ready-status');
const queueList      = document.getElementById('queue-list');
const recipientWrap  = document.getElementById('recipient-wrap');
const toast          = document.getElementById('toast');

document.getElementById('logo-img').src = document.querySelector('link[rel="apple-touch-icon"]').href;

// Convert a Supabase row into the shape the UI expects
function rowToOrder(row) {
  return {
    id:       row.id,
    tea:      { name: row.tea_name, emoji: row.tea_emoji },
    extras:   row.extras ? row.extras.split(', ').filter(Boolean) : [],
    note:     row.note,
    time:     row.time,
    notified: row.notified
  };
}

async function loadQueue() {
  try {
    const rows = await sbFetchOrders();
    const prevLen = queue.length;
    queue = rows.map(rowToOrder);
    if (queue.length) {
      latestOrder = queue[0];
      renderPending();
      readyCard.style.display = '';
    } else {
      pendingDisplay.innerHTML = '<div class="pending-empty">No orders received yet ☕</div>';
      readyCard.style.display = 'none';
    }
    renderQueue();
    if (queue.length > prevLen && prevLen > 0) showToast('🆕 New order received!');
  } catch(e) {
    console.error('Supabase fetch failed:', e);
  }
}

function renderPending(){
  if(!latestOrder){pendingDisplay.innerHTML='<div class="pending-empty">No orders received yet ☕</div>';return;}
  const o=latestOrder;
  pendingDisplay.innerHTML=`
    <div class="pending-order">
      <div class="pending-tea">${o.tea.emoji} ${o.tea.name}</div>
      <div class="pending-detail"><strong>Add-ons:</strong> ${o.extras.length?o.extras.join(', '):'None'}</div>
      ${o.note?`<div class="pending-detail"><strong>Note:</strong> ${o.note}</div>`:''}
      <div class="pending-time">Ordered at ${o.time}</div>
    </div>`;
}

function renderQueue(){
  if(!queue.length){queueList.innerHTML='<div class="empty-state">No orders yet today ☕</div>';return;}
  queueList.innerHTML=queue.map((o,i)=>{
    const sub=[o.extras.join(', '),o.note].filter(Boolean).join(' · ')||'No add-ons';
    const badge=o.notified?`<span class="q-badge sent">✓ Notified</span>`:`<span class="q-badge">${i===0?'Latest':''}</span>`;
    return`<div class="queue-row"><div class="q-icon">${o.tea.emoji}</div><div class="q-info"><div class="q-name">${o.tea.name}</div><div class="q-sub">${sub}</div></div><div class="q-meta"><span class="q-time">${o.time}</span>${badge}</div></div>`;
  }).join('');
}

// ── Recipient toggle ──────────────────────────────────────────
recipientWrap.addEventListener('click',e=>{
  const chip=e.target.closest('.r-chip');
  if(!chip)return;
  chip.classList.toggle('selected');
});

// ── Ready button ──────────────────────────────────────────────
readyBtn.addEventListener('click',async()=>{
  if(!latestOrder)return;
  const selected=[...recipientWrap.querySelectorAll('.r-chip.selected')];
  if(!selected.length){
    readyStatus.textContent='⚠ Select at least one recipient';
    readyStatus.className='ready-status err';
    return;
  }
  readyBtn.disabled=true;readyBtn.textContent='Sending…';
  readyStatus.textContent='';readyStatus.className='ready-status';
  const o=latestOrder;
  const extrasStr = o.extras.length ? o.extras.join(', ') : 'None';
  const msg = `☕ Your ${o.tea.name} is ready!\nAdd-ons: ${extrasStr}${o.note ? '\nNote: '+o.note : ''}\nOrdered at ${o.time}`;
  let allOk=true;
  for(const chip of selected){
    const r = RECIPIENTS[chip.dataset.key];
    if(!r) continue;
    try{ await sendSMS(r.phone, msg); }
    catch(err){ allOk=false; console.error(err); }
  }
  if(allOk){
    readyStatus.textContent='✓ Notification'+(selected.length>1?'s':'')+' sent!';
    readyStatus.className='ready-status ok';
    readyBtn.textContent='✓ Sent!';
    showToast('📬 Order ready notification sent!');
    if(latestOrder.id) await sbMarkNotified(latestOrder.id);
    await loadQueue();
  }else{
    readyStatus.textContent='⚠ Some notifications failed';
    readyStatus.className='ready-status err';
    readyBtn.textContent='☕ Send "Order Ready" Notification';
    readyBtn.disabled=false;
  }
});

function showToast(msg){
  toast.textContent=msg;toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'),3000);
}

// ── Load & poll every 5s ──────────────────────────────────────
loadQueue();
setInterval(loadQueue, 5000);
</script>
</body>
</html>
