<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --blue:#3a82c4;--blue-mid:#2e6fab;--blue-dark:#1d4f80;
  --blue-light:#5fa3d8;--blue-pale:#d6e9f7;--blue-ultra:#eef5fc;
  --white:#ffffff;--off-white:#f2f6fb;--sheet:#ffffff;
  --label:#0d1b2a;--label-sec:#4a6580;--label-ter:#8da8c0;
  --sep:rgba(58,130,196,0.13);--sep-strong:rgba(58,130,196,0.22);
  --fill-1:rgba(58,130,196,0.06);--fill-2:rgba(58,130,196,0.10);

  --shadow:0 2px 14px rgba(30,80,140,0.10),0 1px 3px rgba(30,80,140,0.07);
  --shadow-btn:0 4px 18px rgba(30,100,200,0.24);
}
html,body{height:100%;background:var(--off-white);}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--label);-webkit-font-smoothing:antialiased;overscroll-behavior:none;}
.app{max-width:430px;margin:0 auto;min-height:100vh;padding-bottom:env(safe-area-inset-bottom,24px);background:var(--off-white);}
.app-header{background:linear-gradient(155deg,#2563a8 0%,#3a82c4 50%,#5fa3d8 100%);padding:52px 24px 28px;position:relative;overflow:hidden;}
.app-header::before{content:'';position:absolute;top:-70px;right:-50px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,0.08);}
.app-header::after{content:'';position:absolute;bottom:-90px;left:-50px;width:220px;height:220px;border-radius:50%;background:rgba(255,255,255,0.05);}
.logo-wrap{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;}
.logo-img{width:156px;height:auto;border-radius:18px;display:block;box-shadow:0 8px 32px rgba(10,40,90,0.28);}
.header-tagline{color:rgba(255,255,255,0.78);font-size:14px;font-weight:600;margin-top:13px;letter-spacing:0.01em;}
.steam-row{display:flex;justify-content:center;gap:9px;margin-top:16px;position:relative;z-index:1;}
.steam-line{width:2.5px;border-radius:2px;background:rgba(255,255,255,0.38);animation:steam 2.3s ease-in-out infinite;}
.steam-line:nth-child(1){height:16px;animation-delay:0s;}
.steam-line:nth-child(2){height:24px;animation-delay:0.35s;}
.steam-line:nth-child(3){height:13px;animation-delay:0.7s;}
.steam-line:nth-child(4){height:20px;animation-delay:0.15s;}
.steam-line:nth-child(5){height:15px;animation-delay:0.5s;}
@keyframes steam{0%,100%{opacity:0.18;transform:scaleY(0.65);}50%{opacity:0.85;transform:scaleY(1);}}
.scroll-body{padding:18px 14px 32px;display:flex;flex-direction:column;gap:16px;}
.card{background:var(--sheet);border-radius:var(--r-xl);box-shadow:var(--shadow);overflow:hidden;animation:fadeUp 0.42s ease both;}
.card:nth-child(2){animation-delay:0.06s;}.card:nth-child(3){animation-delay:0.12s;}.card:nth-child(4){animation-delay:0.18s;}.card:nth-child(5){animation-delay:0.22s;}
.card-title{font-size:12px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;color:var(--blue-mid);padding:15px 18px 9px;}
.tea-row{display:flex;align-items:center;gap:13px;padding:12px 18px;cursor:pointer;transition:background 0.12s;position:relative;-webkit-tap-highlight-color:transparent;}
.tea-row:active{background:var(--fill-1);}
.tea-row+.tea-row::before{content:'';position:absolute;top:0;left:55px;right:0;height:0.5px;background:var(--sep);}
.tea-icon{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:1.45rem;flex-shrink:0;transition:transform 0.2s;}
.tea-row.selected .tea-icon{transform:scale(1.1);}
.ic-yellow{background:#fff8e1;}.ic-orange{background:#fff3e0;}.ic-amber{background:#fff8e1;}.ic-green{background:#e8f5e9;}.ic-red{background:#fce4ec;}.ic-purple{background:#f3e5f5;}.ic-teal{background:#e0f7fa;}
.tea-info{flex:1;min-width:0;}
.tea-name{font-size:16px;font-weight:700;color:var(--label);line-height:1.2;}
.tea-desc{font-size:13px;color:var(--label-sec);margin-top:1px;font-weight:400;}
.tea-check{width:24px;height:24px;border-radius:50%;border:2px solid var(--sep-strong);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.22s cubic-bezier(.34,1.56,.64,1);background:transparent;}
.tea-row.selected .tea-check{background:var(--blue);border-color:var(--blue);transform:scale(1.12);}
.check-mark{width:12px;height:12px;stroke:#fff;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;fill:none;opacity:0;transform:scale(0.4);transition:all 0.2s ease;}
.tea-row.selected .check-mark{opacity:1;transform:scale(1);}
.chips-wrap{padding:4px 18px 16px;display:flex;flex-wrap:wrap;gap:8px;}
.chip{padding:8px 16px;border-radius:var(--r-pill);border:1.5px solid var(--sep-strong);background:transparent;font-size:14px;font-weight:700;color:var(--label-sec);font-family:'Nunito',sans-serif;cursor:pointer;transition:all 0.15s;-webkit-tap-highlight-color:transparent;user-select:none;}
.chip:active{opacity:0.7;}
.chip.selected{border-color:var(--blue);background:var(--blue-pale);color:var(--blue-dark);}
.note-wrap{padding:2px 18px 16px;}
textarea{width:100%;resize:none;height:78px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:500;color:var(--label);border:1.5px solid var(--sep-strong);border-radius:14px;padding:12px 14px;background:var(--off-white);transition:border-color 0.18s;caret-color:var(--blue);}
textarea:focus{outline:none;border-color:var(--blue);}
textarea::placeholder{color:var(--label-ter);}
.send-section{animation:fadeUp 0.42s 0.26s ease both;}
.send-btn{width:100%;padding:17px;background:linear-gradient(135deg,#2563a8 0%,#3a82c4 55%,#5fa3d8 100%);color:#fff;border:none;border-radius:var(--r-xl);font-family:'Nunito',sans-serif;font-size:17px;font-weight:800;letter-spacing:0.01em;cursor:pointer;box-shadow:var(--shadow-btn);transition:opacity 0.18s,transform 0.12s,box-shadow 0.18s;-webkit-tap-highlight-color:transparent;}
.send-btn:hover:not(:disabled){box-shadow:0 6px 24px rgba(30,100,200,0.34);}
.send-btn:active:not(:disabled){transform:scale(0.98);box-shadow:0 2px 8px rgba(30,100,200,0.18);}
.send-btn:disabled{opacity:0.36;cursor:default;box-shadow:none;}
.send-status{text-align:center;font-size:14px;font-weight:700;margin-top:10px;min-height:20px;color:var(--label-ter);}
.send-status.ok{color:var(--success);}.send-status.err{color:var(--danger);}
.history-row{display:flex;align-items:center;gap:12px;padding:12px 18px;position:relative;}
.history-row+.history-row::before{content:'';position:absolute;top:0;left:54px;right:0;height:0.5px;background:var(--sep);}
.hist-icon{width:38px;height:38px;border-radius:10px;background:var(--blue-ultra);display:flex;align-items:center;justify-content:center;font-size:1.25rem;flex-shrink:0;}
.hist-info{flex:1;min-width:0;}
.hist-name{font-size:15px;font-weight:700;color:var(--label);}
.hist-sub{font-size:12px;color:var(--label-sec);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hist-time{font-size:12px;color:var(--label-ter);font-weight:700;white-space:nowrap;}
.empty-state{padding:18px;font-size:14px;color:var(--label-ter);text-align:center;font-weight:600;}
/* RATING MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(13,27,42,0.55);z-index:800;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.28s;}
.modal-overlay.show{opacity:1;pointer-events:all;}
.modal-sheet{background:var(--sheet);border-radius:28px 28px 0 0;padding:28px 24px calc(28px + env(safe-area-inset-bottom,0px));width:100%;max-width:430px;transform:translateY(40px);transition:transform 0.32s cubic-bezier(.22,1,.36,1);}
.modal-overlay.show .modal-sheet{transform:translateY(0);}
.modal-title{font-size:18px;font-weight:800;color:var(--label);text-align:center;margin-bottom:6px;}
.modal-sub{font-size:14px;color:var(--label-sec);text-align:center;font-weight:500;margin-bottom:20px;}
.stars-row{display:flex;justify-content:center;gap:10px;margin-bottom:20px;}
.star-btn{font-size:2.1rem;cursor:pointer;transition:transform 0.15s;background:none;border:none;line-height:1;-webkit-tap-highlight-color:transparent;}
.star-btn:active{transform:scale(0.88);}
.star-btn.lit{filter:drop-shadow(0 2px 6px rgba(255,180,0,0.45));}
.modal-feedback{width:100%;resize:none;height:72px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:500;color:var(--label);border:1.5px solid var(--sep-strong);border-radius:14px;padding:11px 13px;background:var(--off-white);caret-color:var(--blue);margin-bottom:16px;transition:border-color 0.18s;}
.modal-feedback:focus{outline:none;border-color:var(--blue);}
.modal-feedback::placeholder{color:var(--label-ter);}
.modal-actions{display:flex;gap:10px;}
.modal-skip{flex:1;padding:14px;background:var(--fill-2);color:var(--label-sec);border:none;border-radius:16px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.modal-submit{flex:2;padding:14px;background:linear-gradient(135deg,#2563a8 0%,#3a82c4 55%,#5fa3d8 100%);color:#fff;border:none;border-radius:16px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;box-shadow:var(--shadow-btn);-webkit-tap-highlight-color:transparent;}
.modal-submit:disabled{opacity:0.36;cursor:default;box-shadow:none;}
.toast{position:fixed;bottom:calc(28px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%) translateY(120px);background:rgba(13,27,42,0.93);color:#fff;padding:13px 26px;border-radius:var(--r-pill);font-size:15px;font-weight:700;font-family:'Nunito',sans-serif;white-space:nowrap;z-index:999;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,0.25);transition:transform 0.38s cubic-bezier(.22,1,.36,1);}
.toast.show{transform:translateX(-50%) translateY(0);}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>
<div class="app">
  <div class="app-header">
    <div class="logo-wrap">
      <img class="logo-img" id="logo-img" src="" alt="Wiffy Tea"/>
      <p class="header-tagline">What's your order, love? ☕</p>
      <div class="steam-row">
        <div class="steam-line"></div><div class="steam-line"></div><div class="steam-line"></div><div class="steam-line"></div><div class="steam-line"></div>
      </div>
    </div>
  </div>
  <div class="scroll-body">
    <div class="card">
      <div class="card-title">Choose your tea</div>
      <div id="tea-list"></div>
    </div>
    <div class="card">
      <div class="card-title">Add-ons</div>
      <div class="chips-wrap" id="chips-wrap"></div>
    </div>
    <div class="card">
      <div class="card-title">Special note</div>
      <div class="note-wrap">
        <textarea id="message" placeholder="Extra hot, steep longer, pretty please…"></textarea>
      </div>
    </div>
    <div class="send-section">
      <button class="send-btn" id="send-btn" disabled>Choose a tea first</button>
      <div class="send-status" id="send-status"></div>
    </div>
    <div class="card">
      <div class="card-title">Recent requests</div>
      <div id="history-list"><div class="empty-state">No requests yet today ☕</div></div>
    </div>
  </div>
</div>

<!-- Rating Modal -->
<div class="modal-overlay" id="rating-modal">
  <div class="modal-sheet">
    <div class="modal-title">How was your tea? ☕</div>
    <div class="modal-sub" id="modal-sub">Rate your order</div>
    <div class="stars-row" id="stars-row">
      <button class="star-btn" data-star="1">☆</button>
      <button class="star-btn" data-star="2">☆</button>
      <button class="star-btn" data-star="3">☆</button>
      <button class="star-btn" data-star="4">☆</button>
      <button class="star-btn" data-star="5">☆</button>
    </div>
    <textarea class="modal-feedback" id="modal-feedback" placeholder="Any feedback for Paul? (optional)"></textarea>
    <div class="modal-actions">
      <button class="modal-skip" id="modal-skip">Skip</button>
      <button class="modal-submit" id="modal-submit" disabled>Send Rating</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script>
const PAUL_PHONE   = '+61402607077';

async function sendSMS(to, message) {
  const res = await fetch('/.netlify/functions/send-sms', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ to, message })
  });
  if (!res.ok) throw new Error(await res.text());
}

const SB_URL  = 'https://acsulaharyphoxjpbomt.supabase.co';
const SB_KEY  = 'sb_publishable_sfSCplenSKGzrRyH4g_XVA_Kx24TaeI';

async function sbInsertOrder(order) {
  const res = await fetch(`${SB_URL}/rest/v1/orders`, {
    method: 'POST',
    headers: {
      'apikey': SB_KEY,
      'Authorization': 'Bearer ' + SB_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    },
    body: JSON.stringify({
      tea_name:  order.tea.name,
      tea_emoji: order.tea.emoji,
      extras:    order.extras.join(', '),
      note:      order.note || '',
      time:      order.time,
      notified:  false
    })
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

const TEAS=[
  {id:'chamomile',   name:'Chamomile',    desc:'Calming & floral',   emoji:'🌼', ic:'ic-yellow'},
  {id:'tiger',       name:'Tiger Tea',    desc:'Bold & warming',     emoji:'🐯', ic:'ic-orange'},
  {id:'chai',        name:'Chai',         desc:'Spiced & rich',      emoji:'✨', ic:'ic-amber'},
  {id:'daily-detox', name:'Daily Detox',  desc:'Cleansing & light',  emoji:'🌿', ic:'ic-green'},
  {id:'ginger-kick', name:'Ginger Kick',  desc:'Zingy & warming',    emoji:'🫚', ic:'ic-red'},
  {id:'purple-chai', name:'Purple Chai',  desc:'Dreamy & aromatic',  emoji:'💜', ic:'ic-purple'},
  {id:'green',       name:'Green Tea',    desc:'Fresh & grassy',     emoji:'🍃', ic:'ic-teal'},
];
const EXTRAS=['Honey','Oat milk','Splash of milk','Lactose free','Whipped cream','Extra strong','Half strength','Lemon slice'];
const DEFAULT_EXTRAS=new Set(['Lactose free']);

let selectedTea=null, selectedExtras=new Set(DEFAULT_EXTRAS), history=[];
let lastOrder=null, ratingStars=0;

const teaList      = document.getElementById('tea-list');
const chipsWrap    = document.getElementById('chips-wrap');
const sendBtn      = document.getElementById('send-btn');
const msgInput     = document.getElementById('message');
const historyList  = document.getElementById('history-list');
const toast        = document.getElementById('toast');
const sendStatus   = document.getElementById('send-status');
const ratingModal  = document.getElementById('rating-modal');
const modalSub     = document.getElementById('modal-sub');
const starsRow     = document.getElementById('stars-row');
const modalFeedback= document.getElementById('modal-feedback');
const modalSkip    = document.getElementById('modal-skip');
const modalSubmit  = document.getElementById('modal-submit');

document.getElementById('logo-img').src = document.querySelector('link[rel="apple-touch-icon"]').href;

TEAS.forEach(tea=>{
  const row=document.createElement('div');
  row.className='tea-row';
  row.innerHTML=`<div class="tea-icon ${tea.ic}">${tea.emoji}</div><div class="tea-info"><div class="tea-name">${tea.name}</div><div class="tea-desc">${tea.desc}</div></div><div class="tea-check"><svg class="check-mark" viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3"/></svg></div>`;
  row.addEventListener('click',()=>{
    document.querySelectorAll('.tea-row').forEach(r=>r.classList.remove('selected'));
    row.classList.add('selected');
    selectedTea=tea;
    sendBtn.disabled=false;
    sendBtn.textContent='Request '+tea.name;
    sendStatus.textContent='';sendStatus.className='send-status';
  });
  teaList.appendChild(row);
});

EXTRAS.forEach(extra=>{
  const chip=document.createElement('div');
  chip.className='chip';
  chip.textContent=extra;
  if(DEFAULT_EXTRAS.has(extra))chip.classList.add('selected');
  chip.addEventListener('click',()=>{
    selectedExtras.has(extra)?selectedExtras.delete(extra):selectedExtras.add(extra);
    chip.classList.toggle('selected',selectedExtras.has(extra));
  });
  chipsWrap.appendChild(chip);
});

sendBtn.addEventListener('click',async()=>{
  if(!selectedTea)return;
  const now=new Date(),timeStr=now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  const extras=[...selectedExtras],note=msgInput.value.trim();
  sendBtn.disabled=true;sendBtn.textContent='Sending…';
  sendStatus.textContent='';sendStatus.className='send-status';
  try{
    const extrasStr = extras.length ? extras.join(', ') : 'None';
    const msg = `☕ WiffyTea order!\n${selectedTea.emoji} ${selectedTea.name}\nAdd-ons: ${extrasStr}${note ? '\nNote: '+note : ''}\nTime: ${timeStr}`;
    await sendSMS(PAUL_PHONE, msg);
    sendStatus.textContent='✓ Paul has been notified!';sendStatus.className='send-status ok';
  }catch(err){
    sendStatus.textContent='⚠ SMS failed — please try again';
    sendStatus.className='send-status err';
    console.error(err);
  }
  lastOrder={tea:selectedTea,extras,note,time:timeStr,notified:false};
  history.unshift(lastOrder);
  if(history.length>6)history.pop();
  renderHistory();
  try{ await sbInsertOrder(lastOrder); }catch(e){ console.error('Supabase insert failed:',e); }
  showToast(selectedTea.emoji+' '+selectedTea.name+' ordered!');
  setTimeout(()=>openRatingModal(selectedTea),800);
  document.querySelectorAll('.tea-row').forEach(r=>r.classList.remove('selected'));
  document.querySelectorAll('.chip').forEach(c=>{
    c.classList.remove('selected');
    if(DEFAULT_EXTRAS.has(c.textContent))c.classList.add('selected');
  });
  selectedTea=null;selectedExtras=new Set(DEFAULT_EXTRAS);msgInput.value='';
  sendBtn.disabled=true;sendBtn.textContent='Choose a tea first';
});

function openRatingModal(tea){
  ratingStars=0;
  modalFeedback.value='';
  modalSubmit.disabled=true;
  modalSub.textContent='Rate your '+tea.name+' '+tea.emoji;
  updateStars(0);
  ratingModal.classList.add('show');
}
function updateStars(n){
  document.querySelectorAll('.star-btn').forEach((btn,i)=>{
    btn.textContent=i<n?'⭐':'☆';
    btn.classList.toggle('lit',i<n);
    btn.style.fontSize=i<n?'2.3rem':'2.1rem';
  });
}
starsRow.addEventListener('click',e=>{
  const btn=e.target.closest('.star-btn');
  if(!btn)return;
  ratingStars=parseInt(btn.dataset.star);
  updateStars(ratingStars);
  modalSubmit.disabled=ratingStars<1;
});
modalSkip.addEventListener('click',()=>ratingModal.classList.remove('show'));
modalSubmit.addEventListener('click',async()=>{
  if(!lastOrder||ratingStars<1)return;
  modalSubmit.disabled=true;modalSubmit.textContent='Sending…';
  const stars='⭐'.repeat(ratingStars);
  const fb=modalFeedback.value.trim()||'No additional feedback';
  try{
    const stars='⭐'.repeat(ratingStars);
    const fb=modalFeedback.value.trim()||'No additional feedback';
    const msg = `${stars} WiffyTea rating!\n${lastOrder.tea.emoji} ${lastOrder.tea.name}\n${stars} — ${fb}`;
    await sendSMS(PAUL_PHONE, msg);
    showToast('⭐ Rating sent — thanks!');
  }catch(err){showToast('⚠ Couldn\'t send rating');console.error(err);}
  ratingModal.classList.remove('show');
  modalSubmit.textContent='Send Rating';
});
ratingModal.addEventListener('click',e=>{if(e.target===ratingModal)ratingModal.classList.remove('show');});

function renderHistory(){
  if(!history.length){historyList.innerHTML='<div class="empty-state">No requests yet today ☕</div>';return;}
  historyList.innerHTML=history.map(h=>{
    const sub=[h.extras.join(', '),h.note].filter(Boolean).join(' · ')||'No add-ons';
    return`<div class="history-row"><div class="hist-icon">${h.tea.emoji}</div><div class="hist-info"><div class="hist-name">${h.tea.name}</div><div class="hist-sub">${sub}</div></div><div class="hist-time">${h.time}</div></div>`;
  }).join('');
}
function showToast(msg){
  toast.textContent=msg;toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'),3000);
}
</script>
</body>
</html>
